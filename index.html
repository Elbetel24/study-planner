<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Planner</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <h1>Study Planner</h1>
        <p>Organize your study sessions, tasks, and goals.</p>
    </header>
    <aside id="notes-sidebar">
        <h2>Notes</h2>
        <textarea id="notes-area" placeholder="Keep quick notes here..."></textarea>
    </aside>
    <main>
        <!-- quote box -->
        <aside id="quote-box">
            <p id="quote-text">"Stay focused and keep pushing forward."</p>
            <div id="quote-time"></div>
            <div id="task-countdown"></div>
        </aside>
        <!-- login/register section -->
        <section id="auth-section">
            <h2>Login or Register</h2>
            <form id="login-form">
                <label for="username">Username</label>
                <br>
                <input type="text" id="username" required />
                <br>
                <label for="password">Password</label>
                <br>
                <input type="password" id="password" required />
                <br>
                <button type="submit">Login</button>
                <br>
                <button type="button" id="show-register">Register</button>
                <br>
            </form>
            <form id="register-form" style="display:none;">
                <label for="reg-username">Username</label>
                <br>
                <input type="text" id="reg-username" required />
                <br>
                <label for="reg-password">Password</label>
                <br>
                <input type="password" id="reg-password" required />
                <br>
                <button type="submit">Create Account</button>
                <br>
                <button type="button" id="show-login">Back to Login</button>
                <br>
            </form>
        </section>
        <!-- planner section -->
        <section id="planner" style="display:none;">
           
            <section id="task-form">
                <h2>Add New Task</h2>
                <form>
                    <label for="title">Title</label>
                    <input type="text" id="title" required />
                    <label for="due">Due Date</label>
                    <input type="date" id="due" required />
                    <label for="color">Color</label>
                    <input type="color" id="color" value="#4CAF50" />
                    <button type="submit">Add Task</button>
                </form>
            </section>
            <section id="tasks">
                <h2>Your Tasks</h2>
                <ul id="task-list"></ul>
            </section>
             <div id="planner-buttons">
                <button id="logout">Logout</button>
                <button id="show-calendar">Show Calendar</button>
            </div>
            <!-- calendar display -->
            <section id="calendar-section" style="display:none;">
                <h2>Calendar</h2>
                <div id="calendar-controls">
                    <button id="prev-month">&lt;</button>
                    <span id="current-month"></span>
                    <button id="next-month">&gt;</button>
                </div>
                <table id="calendar">
                    <thead>
                        <tr>
                            <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="day-tasks" style="display:none;">
                    <h3>Tasks on <span id="selected-date"></span></h3>
                    <ul id="selected-task-list"></ul>
                </div>
            </section>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
